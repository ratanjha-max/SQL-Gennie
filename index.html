<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Ginny · Enterprise AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #050505;          
    --bg-sidebar: rgba(10, 10, 15, 0.6);
    --bg-surface: rgba(25, 25, 35, 0.4);
    --bg-surface-hover: rgba(40, 40, 55, 0.6);
    --border: rgba(255, 255, 255, 0.08);
    --accent: #00f2fe;           
    --accent-hover: #4facfe;
    --text-primary: #ffffff;
    --text-secondary: #94a3b8;
    --sql-bg: rgba(0, 0, 0, 0.5);
    --danger: #ef4444;
    --success: #10b981;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 24px;
  }

  body.light-mode {
    --bg-main: #f8fafc;
    --bg-sidebar: rgba(255, 255, 255, 0.7);
    --bg-surface: rgba(240, 240, 245, 0.6);
    --bg-surface-hover: rgba(225, 225, 235, 0.8);
    --border: rgba(0, 0, 0, 0.08);
    --accent: #2563eb;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ══ AMBIENT GLOW ══ */
  .ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.25;
    z-index: 0;
    pointer-events: none;
  }
  .glow-1 { width: 500px; height: 500px; top: -100px; left: -100px; background: #00f2fe; animation: float1 15s infinite alternate ease-in-out; }
  .glow-2 { width: 400px; height: 400px; bottom: -100px; right: -50px; background: #8b5cf6; animation: float2 20s infinite alternate ease-in-out; }
  @keyframes float1 { 0% { transform: translate(0,0); } 100% { transform: translate(50px, 50px); } }
  @keyframes float2 { 0% { transform: translate(0,0); } 100% { transform: translate(-50px, -50px); } }

  /* ══ MAGICAL GINNY AVATAR GLOW ══ */
  .ginny-avatar-wrapper {
    position: relative;
    display: inline-block;
    border-radius: 50%;
  }
  .ginny-avatar-glow {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00f2fe, #4facfe, #8b5cf6);
    filter: blur(8px);
    z-index: 0;
    animation: magicPulse 2s infinite alternate ease-in-out;
  }
  .ginny-avatar-img {
    position: relative;
    z-index: 1;
    border-radius: 50%;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
    border: 1px solid rgba(255,255,255,0.2);
  }
  @keyframes magicPulse {
    0% { opacity: 0.6; transform: scale(0.95); filter: blur(6px); }
    100% { opacity: 1; transform: scale(1.05); filter: blur(12px); }
  }

  /* ══ LOGIN ══ */
  #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); }
  .login-card { width: 400px; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 40px; text-align: center; position: relative; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 10000; }
  
  .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; color: var(--text-primary); margin-top: 16px;}
  .login-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text-primary); font-family: 'Inter', sans-serif; outline: none; transition: 0.2s; }
  .form-input:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); }
  .error-msg { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }
  .error-msg.show { display: block; }
  .btn-login { width: 100%; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 8px; }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); }

  /* ══ APP LAYOUT ══ */
  #app { display: none; width: 100%; height: 100%; flex-direction: row; position: relative; z-index: 1; }
  #app.visible { display: flex; }

  /* ══ SIDEBAR ══ */
  .sidebar { width: 280px; background: var(--bg-sidebar); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

  .superset-card { background: linear-gradient(135deg, rgba(0,186,242,0.12), rgba(0,41,112,0.2)); border: 1px solid rgba(0,186,242,0.25); border-radius: var(--radius-md); padding: 16px; cursor: pointer; transition: 0.25s; text-decoration: none; display: block; }
  .superset-card:hover { border-color: rgba(0,186,242,0.5); transform: translateY(-2px); }
  .superset-label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .superset-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  
  .tool-btn { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
  .tool-btn:hover { background: var(--bg-surface-hover); }
 
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .user-profile { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
  .avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .btn-icon { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px; border-radius: 4px;}
  .btn-icon:hover { color: var(--text-primary); background: var(--bg-surface); }

  /* ══ MAIN CHAT AREA ══ */
  .main-area { flex: 1; display: flex; flex-direction: column; position: relative; background: transparent; min-width: 0;}

  .context-header { padding: 12px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: rgba(10, 10, 15, 0.4); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 10;}
  .ctx-group { display: flex; align-items: center; gap: 8px; background: var(--bg-surface); padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); transition: 0.2s;}
  .ctx-group:focus-within { border-color: var(--accent); }
  .ctx-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
  .ctx-input { background: transparent; border: none; outline: none; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 12px; width: 150px; }
  .ctx-date { background: transparent; border: none; outline: none; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 12px; color-scheme: dark;}
  
  .toggle-pill { display: flex; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .toggle-pill input { display: none; }
  .toggle-pill label { padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text-secondary); cursor: pointer; text-transform: uppercase; }
  .toggle-pill input:checked + label { background: var(--text-primary); color: #000; }
  
  .btn-run { margin-left: auto; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px;}

  /* Chat */
  #chat-container { flex: 1; overflow-y: auto; padding: 40px 0 120px 0; scroll-behavior: smooth; }
  #chat-container::-webkit-scrollbar { width: 6px; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome-msg { text-align: center; padding: 40px 20px; max-width: 650px; margin: 0 auto; }
  .welcome-msg h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
  .welcome-msg p { color: var(--text-secondary); font-size: 15px; margin-bottom: 40px; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
  .chip { background: var(--bg-surface); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius-md); font-size: 13px; color: var(--text-secondary); cursor: pointer; text-align: left; width: 280px; }
  .chip:hover { background: var(--bg-surface-hover); border-color: var(--accent); }
  .chip span { display: block; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; font-size: 14px;}

  /* Messages */
  .msg { padding: 24px; display: flex; justify-content: center; animation: fadeIn 0.3s ease-out;}
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg-inner { max-width: 850px; width: 100%; display: flex; gap: 20px; }
  
  .msg.user .msg-inner { flex-direction: row-reverse; }
  .msg.user .msg-content { background: var(--bg-surface); padding: 14px 18px; border-radius: var(--radius-md); border-bottom-right-radius: 4px; font-size: 15px; line-height: 1.6; max-width: 80%; border: 1px solid var(--border); }
  
  .msg.assistant .msg-content { flex: 1; font-size: 15px; line-height: 1.7; color: var(--text-primary); }
 
  .explain-block { margin-bottom: 16px; color: var(--text-secondary); }
  .explain-block strong { color: var(--text-primary); }
 
  .sql-wrapper { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-top: 16px; background: rgba(0,0,0,0.6); }
  .sql-header { display: flex; padding: 10px 16px; background: rgba(255,255,255,0.05); align-items: center; border-bottom: 1px solid var(--border); }
  .sql-lang { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase;}
 
  /* ══ SQL ACTION BAR (New Session in middle) ══ */
  .sql-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .btn-code { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 4px; transition: 0.2s;}
  .btn-code:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
  .btn-code.highlight { color: var(--success); border-color: var(--success); }
  
  .btn-code.primary-action { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; border: none; font-weight: 600; }
  .btn-code.primary-action:hover { filter: brightness(1.1); color: #000; }

  .sql-code { padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #e2e8f0; overflow-x: auto; white-space: pre; line-height: 1.6;}
  .kw { color: #c678dd; font-weight: 600;}
  .str { color: #98c379; }
  .num { color: #d19a66; }

  /* Recon Table */
  .recon-table-wrap { overflow-x: auto; margin-top: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: rgba(0,0,0,0.4); }
  .recon-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: right; }
  .recon-table th { padding: 12px; background: rgba(255,255,255,0.05); color: var(--text-secondary); border-bottom: 1px solid var(--border); white-space: nowrap; text-transform: uppercase; font-size: 10px; text-align: left;}
  .recon-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); white-space: nowrap; }
  .recon-table tr:hover { background: rgba(255,255,255,0.05); }

  /* Floating Input Bar */
  .input-area-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; background: linear-gradient(to top, var(--bg-main) 60%, transparent); display: flex; justify-content: center; z-index: 20;}
  .input-box-wrapper { width: 100%; max-width: 800px; background: rgba(30, 30, 40, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius-lg); padding: 10px 16px; display: flex; align-items: flex-end; gap: 12px; box-shadow: var(--shadow-lg); transition: all 0.3s; }
  .input-box-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 10px 40px -3px rgba(0,242,254,0.15); }
  #query-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 15px; resize: none; max-height: 150px; min-height: 24px; line-height: 1.5; padding: 8px 0; }
  
  .send-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; border: none; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; margin-bottom: 2px; }
  .send-btn:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 0 15px rgba(0,242,254,0.4); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #fff; color: #000; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 9999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

const fmt = d => (d instanceof Date ? d : new Date(d+'T00:00:00')).toISOString().split('T')[0];
const fmtDisplay = ds => new Date(ds+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
const fmtMoney = val => '₹' + val.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

function toggleTheme() {
  document.body.classList.toggle('light-mode');
}

function doLogin() {
  const userEl = document.getElementById('login-user');
  const passEl = document.getElementById('login-pass');
  if(!userEl || !passEl) return;
  const raw = userEl.value.trim().toLowerCase();
  const user = raw.replace(/@paytm\.com$|@paytmpayments\.com$/,'');
  const pass = passEl.value;
  const errEl = document.getElementById('login-error');
  if (USERS[user] && USERS[user] === pass) {
    currentUser = user;
    sessionStorage.setItem('sguser', user);
    errEl.classList.remove('show');
    launchApp(user);
  } else {
    errEl.classList.add('show');
    passEl.classList.add('shake');
    setTimeout(() => passEl.classList.remove('shake'), 500);
  }
}

function launchApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-label').textContent = user;
  const today = new Date();
  const lastYear = new Date(today); lastYear.setFullYear(today.getFullYear()-1);
  document.getElementById('date-to').value = fmt(today);
  document.getElementById('date-from').value = fmt(lastYear);
}

function doLogout() {
  sessionStorage.removeItem('sguser');
  currentUser = ''; chatHistory = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('sguser');
  if (saved && USERS[saved]) { currentUser = saved; launchApp(saved); }
});

function handleDateMode(radio) {
  const fromInput = document.getElementById('date-from');

function generateSettlementQuery() {
  const mid = document.getElementById('mid-input').value.trim().toLowerCase();
  const startDate = document.getElementById('date-from').value;
  const endDate = document.getElementById('date-to').value;
  if (!mid) { showToast(' Please enter a MID'); return; }
  if (!startDate || !endDate) { showToast(' Please select dates'); return; }
  chatHistory = []; clearChatUI();
  addUserMsg(`Generate Settlement query for MID: ${mid}`);
  const sql = buildSettlementSQL(mid, startDate, endDate);
  addAssistantMsg(sql, `The virtual assistant's latest message so generated this:`);
}

function buildTransactionSQL(mid, s, e) {
  return `SELECT CONCAT('#', a.txn_id) AS txn_id_hash,
    a.*
FROM hive_offline.dwh.pg_olap a
WHERE a.txn_started_at >= TIMESTAMP '${s}'
  AND a.txn_started_at <= TIMESTAMP '${e}'
  AND a.ingest_date >= DATE '${s}'
  AND a.txn_status = 'SUCCESS'
  AND LOWER(a.mid) in ('${mid}');`;
}

function buildSettlementSQL(mid, s, e) {
  return `SELECT
    k1.mid,
    txn_id,
    txn_started_at,
    order_id,
    payment_type,
    payment_mode,
    txn_amount,
    settlement_date,
    settled_amount,
    fund_type,
    UTR,
    ESN,
    card_category AS bank
FROM (
    SELECT
        mid,
        txn_id,
        txn_started_at,
        order_id,
        payment_type,
        payment_mode,
        txn_amount,
        settlement_date,
        settled_amount,
        fund_type,
        UTR,
        bank_name,
        card_category,
        CONCAT('#', CAST(settlement_esn AS VARCHAR)) AS ESN
    FROM (
        SELECT
            mid,
            CONCAT('#', txn_id) AS txn_id,
            txn_started_at,
            CONCAT('#', order_id) AS order_id,
            payment_type,
            payment_mode,
            txn_amount,
            settlement_date,
            settlement_esn,
            settled_amount,
            bank_name,
            card_category,
            fund_type,
            CONCAT('#', UTR) AS UTR
        FROM (
            SELECT
                mid,
                txn_id,
                txn_started_at,
                txn_amount,
                order_id,
                payment_type,
                payment_mode,
                settlement_date,
                settlement_esn,
                settled_amount,
                fund_type,
                UTR,
                bank_name,
                card_category,
                ROW_NUMBER() OVER (
                    PARTITION BY txn_id
                    ORDER BY settlement_date ASC
                ) AS srno
            FROM (
                SELECT
                    a.mid,
                    a.txn_id,
                    a.txn_started_at,
                    a.txn_amount,
                    order_id,
                    a.payment_type,
                    a.payment_mode,
                    b.created_date AS settlement_date,
                    b.esn AS settlement_esn,
                    b.amount AS settled_amount,
                    bank_name,
                    card_category,
                    fund_type,
                    UTR
                FROM (
                    SELECT
                        LOWER(mid) AS mid,
                        txn_id,
                        txn_started_at,
                        txn_amount,
                        order_id,
                        payment_type,
                        payment_mode,
                        bank_name,
                        card_category
                    FROM hive_offline.dwh.pg_olap
                    WHERE responsecode = '01'
                      AND LOWER(mid) IN ('${mid}')
                      AND DATE(txn_started_at) BETWEEN DATE '${s}' AND DATE '${e}'
                      AND ingest_date >= DATE '${s}'
                ) a
                JOIN (
                    SELECT
                        LOWER(paytm_mid) AS original_merchant_id,
                        CAST(a.sts_transfer_id AS VARCHAR) AS esn,
                        amount,
                        created_time AS created_date,
                        rrn_id AS UTR,
                        CASE
                            WHEN is_manual_m2b = 1 THEN 'MERCHANT_WITHDRAW'
                            ELSE 'MERCHANT_AUTO_WITHDRAW'
                        END AS fund_type
                    FROM (
                        (
                            SELECT
                                LOWER(paytm_mid) AS paytm_mid,
                                sts_transfer_id,
                                payout_id,
                                amount / 100 AS amount,
                                created_time
                            FROM hive_offline.stsservicev2.settlement_transfer_snapshot_v3
                            WHERE dl_last_updated BETWEEN DATE '${s}' AND DATE '${e}'
                              AND LOWER(paytm_mid) IN ('${mid}')
                              AND transaction_status = 'FUND_SUCCESS'
                        ) a
                        JOIN (
                            SELECT DISTINCT payout_id, is_manual_m2b
                            FROM hive_offline.stsservicev2.settlement_request_snapshot_v3
                            WHERE dl_last_updated BETWEEN DATE '${s}' AND DATE '${e}'
                        ) b ON a.payout_id = b.payout_id
                        JOIN (
                            SELECT sts_transfer_id, rrn_id
                            FROM hive_offline.stsservicev2.bank_transfer_response_snapshot_v3
                            WHERE dl_last_updated BETWEEN DATE '${s}' AND DATE '${e}'
                        ) c ON a.sts_transfer_id = c.sts_transfer_id
                    )
                    UNION
                    SELECT
                        LOWER(original_merchant_id),
                        CAST(settlement_esn AS VARCHAR),
                        amount,
                        created_date,
                        utr,
                        fund_type
                    FROM (
                        (
                            SELECT
                                LOWER(original_merchant_id) AS original_merchant_id,
                                esn AS settlement_esn,
                                amount,
                                created_date,
                                fund_type
                            FROM hive_offline.oss_paytm_data_lake_prod.adm_business_wallet_v1_snapshot_v3
                            WHERE LOWER(biz_status) = 's07'
                              AND LOWER(original_merchant_id) IN ('${mid}')
                              AND dl_last_updated BETWEEN DATE '${s}' AND DATE '${e}'
                        ) x
                        LEFT JOIN (
                            SELECT
                                external_serial_no AS esn,
                                reference_no AS utr,
                                JSON_EXTRACT_SCALAR(extension_info, '$.payoutId') AS payoutId
                            FROM hive_offline.oss_paytm_data_lake_prod.ods_flux_ex_serial_snapshot_v3
                            WHERE dl_last_updated BETWEEN DATE '${s}' AND DATE '${e}'
                              AND external_event_code LIKE '%alipayplus.fluxnet.paytm.withdraw.request@1.1.2'
                        ) y ON CAST(x.settlement_esn AS VARCHAR) = CAST(y.esn AS VARCHAR)
                    )
                ) b ON a.mid = b.original_merchant_id
            ) a
            WHERE txn_started_at < settlement_date
        ) a
        WHERE srno = 1
    )
) k1
LEFT JOIN (
    SELECT LOWER(mid) AS mid, bank_name
    FROM hive_offline.pg.entity_info_snapshot_v3 x
    JOIN hive_offline.pg.merchant_kyc_details_snapshot_v3 y ON x.id = y.entity_id
    WHERE x.dl_last_updated <= CURRENT_DATE
      AND y.dl_last_updated <= CURRENT_DATE
) k ON k1.mid = k.mid;`;
}

async function sendMessage() {
  const input = document.getElementById('query-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  document.getElementById('send-btn').disabled = true;
 
  const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
  addUserMsg(text);
  chatHistory.push({ role:'user', content:text });
  addThinking();
 
  const todayStr = fmt(new Date());
  const sys = `You are SQL Ginny, expert Trino/Hive SQL assistant.
CURRENT DATE: ${todayStr}. Use this if user says "till date", "today", "now", "current date".

Analyze user input + history. Return EXACTLY ONE of these JSON formats:
1. Settlement request with MID + dates: {"intent":"settlement","mid":"<mid>","start_date":"YYYY-MM-DD","end_date":"YYYY-MM-DD"}
2. Transaction request with MID + dates: {"intent":"transaction","mid":"<mid>","start_date":"YYYY-MM-DD","end_date":"YYYY-MM-DD"}
3. MID + dates but type not specified: {"intent":"clarify","mid":"<mid>","start_date":"YYYY-MM-DD","end_date":"YYYY-MM-DD"}
4. General custom SQL: {"intent":"custom","sql":"...","explanation":"..."}
ALWAYS lowercase the mid. Return ONLY valid JSON.`;

  const messages = [{ role:'system', content:sys }, ...chatHistory.slice(0,-1), { role:'user', content:text }];
 
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_API_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,temperature:0.1,max_tokens:1500})
    });
    const data = await res.json();
    removeThinking();
   
    if (data.error) {
      addErrorMsg('API Error: '+data.error.message);
    } else {
      const raw = data.choices?.[0]?.message?.content||'';
      try {
        const m = raw.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
        const p = JSON.parse(m[0]);
       
        if ((p.intent==='settlement'||p.intent==='transaction') && p.mid && p.start_date && p.end_date) {
          const cleanMid = p.mid.trim().toLowerCase();
          document.getElementById('mid-input').value = cleanMid;
          document.getElementById('date-from').value = p.start_date;
          document.getElementById('date-to').value = p.end_date;
          document.getElementById('custom-date').checked = true;
          const sql = p.intent==='settlement' ? buildSettlementSQL(cleanMid,p.start_date,p.end_date) : buildTransactionSQL(cleanMid,p.start_date,p.end_date);
          addAssistantMsg(sql, `The virtual assistant's latest message so generated this:`);
          chatHistory.push({role:'assistant',content:raw});
        } else if (p.intent==='clarify' && p.mid && p.start_date && p.end_date) {
          const cleanMid = p.mid.trim().toLowerCase();
          document.getElementById('mid-input').value = cleanMid;
          document.getElementById('date-from').value = p.start_date;
          document.getElementById('date-to').value = p.end_date;
          document.getElementById('custom-date').checked = true;
          const msg = `Got details for \`${cleanMid}\`.\n\n**Do you need a Settlement or Transaction (Txn) Report?**`;
          addTextOnlyMsg(msg);
          chatHistory.push({role:'assistant',content:msg});
        } else {
          addAssistantMsg(p.sql||raw, p.explanation||'The virtual assistant\'s latest message so generated this:');
          chatHistory.push({role:'assistant',content:raw});
        }
      } catch {
        addAssistantMsg(raw, 'The virtual assistant\'s latest message so generated this:');
        chatHistory.push({role:'assistant',content:raw});
      }
    }
  } catch(err) {
    removeThinking();
    addErrorMsg('Network error: '+err.message);
  }
  document.getElementById('send-btn').disabled = false;
  document.getElementById('query-input').focus();
}

function processBWCSV(input) {
  const file = input.files[0];
  if (!file) return;

  const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
  addUserMsg(`📊 Uploaded BW Recon File: ${file.name}`);
  addThinking();

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const rows = text.split('\n');
      if (rows.length < 2) throw new Error("File is empty or invalid.");

      const headers = rows[0].split(',').map(h => h.replace(/['"]/g, '').trim());
      const idxDate = headers.findIndex(h => h === 'Updated_Date');
      const idxType = headers.findIndex(h => h === 'Transaction_Type');
      const idxStatus = headers.findIndex(h => h === 'Status');
      const idxAmount = headers.findIndex(h => h === 'Amount');
      const idxComm = headers.findIndex(h => h === 'Commission');
      const idxGST = headers.findIndex(h => h === 'GST');
      const idxUTR = headers.findIndex(h => h === 'UTR_No.');

      if (idxDate === -1 || idxType === -1 || idxAmount === -1) throw new Error("Missing required columns in CSV.");

      let reconData = {};
      let pendingM2BTotal = 0;
      let pendingM2BCount = 0;

      for (let i = 1; i < rows.length; i++) {
        if (!rows[i].trim()) continue;

        let cols = [];
        let inQuote = false;
        let currentVal = '';
        for(let char of rows[i]) {
            if(char === '"' || char === "'") inQuote = !inQuote;
            else if(char === ',' && !inQuote) { cols.push(currentVal); currentVal = ''; }
            else currentVal += char;
        }
        cols.push(currentVal);

        const getVal = (idx) => cols[idx] ? cols[idx].replace(/['"]/g, '').trim() : '';

        const status = getVal(idxStatus).toUpperCase();
        const type = getVal(idxType).toUpperCase();
        const amount = parseFloat(getVal(idxAmount)) || 0;
        const comm = parseFloat(getVal(idxComm)) || 0;
        const gst = parseFloat(getVal(idxGST)) || 0;

        if ((type === 'M2B' || type === 'TRANSFER_TO_BANK') && status === 'PENDING') {
            pendingM2BTotal += amount;
            pendingM2BCount++;
            continue;
        }

        let isBase = (type === 'ACQUIRING' && status === 'SUCCESS');
        let isCbRev = type === 'CHARGEBACK_REVERSAL';
        let isRecRev = type === 'RECOVERY_REVERSAL';
        let isCb = type === 'CHARGEBACK';
        let isDispute = type === 'DISPUTE';
        let isRecDr = type === 'RECOVERY_DEBIT';
        let isRefund = type === 'REFUND';
        
        if (!isBase && !isCbRev && !isRecRev && !isCb && !isDispute && !isRecDr && !isRefund) continue;

        const rawDate = getVal(idxDate);
        let date = rawDate ? rawDate.split(' ')[0] : 'N/A';
        let utr = getVal(idxUTR) || 'PENDING/NO UTR';

        const key = `${date}|${utr}`;
        if (!reconData[key]) reconData[key] = { 
            date, utr, base: 0, refund: 0, cb: 0, dispute: 0, rec_dr: 0, cb_rev: 0, rec_rev: 0, fees: 0 
        };

        if (isBase) { reconData[key].base += amount; reconData[key].fees += (comm + gst); }
        else if (isRefund) { reconData[key].refund += amount; }
        else if (isCb) { reconData[key].cb += amount; }
        else if (isDispute) { reconData[key].dispute += amount; }
        else if (isRecDr) { reconData[key].rec_dr += amount; }
        else if (isCbRev) { reconData[key].cb_rev += amount; }
        else if (isRecRev) { reconData[key].rec_rev += amount; }
        
        if (!isBase) reconData[key].fees += (comm + gst); 
      }

      let alertHtml = '';
      if (pendingM2BCount > 0) {
          alertHtml = `
            <div style="background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); padding: 14px; border-radius: var(--radius-sm); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px);">
              <span style="font-size: 24px;">⏳</span>
              <div>
                <div style="color: var(--danger); font-weight: 700; font-size: 14px; margin-bottom:4px;">Pending Bank Transfer Detected</div>
                <div style="color: var(--text-primary); font-size: 13px;">${pendingM2BCount} M2B transaction(s) pending. Total Amount: <b style="font-family:monospace; font-size:14px;">${fmtMoney(pendingM2BTotal)}</b></div>
              </div>
            </div>
          `;
      }

      let htmlTable = alertHtml + `
        <div class="recon-table-wrap" style="overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-sm); margin-top:16px;">
        <table class="recon-table" style="width:100%; border-collapse:collapse; font-size:12px; text-align:right;">
          <thead style="background:rgba(255,255,255,0.05); font-size:10px; text-transform:uppercase; color:var(--text-secondary);">
            <tr>
              <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border);">Date</th>
              <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border);">UTR No.</th>
              <th style="padding:10px; border-bottom:1px solid var(--border);" title="ACQUIRING (Success)">Acquiring</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--success);" title="CHARGEBACK_REVERSAL">+ CB Rev</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--success);" title="RECOVERY_REVERSAL">+ Rec Rev</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--danger);" title="REFUND">- Refund</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--danger);" title="CHARGEBACK">- CB</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--danger);" title="DISPUTE">- Dispute</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--danger);" title="RECOVERY_DEBIT">- Rec Dr</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--danger);" title="Commission + GST">- Comm&GST</th>
              <th style="padding:10px; border-bottom:1px solid var(--border); color:var(--accent);">Net Settled</th>
            </tr>
          </thead>
          <tbody>
      `;

      let hasData = false;
      const sortedKeys = Object.keys(reconData).sort();

      for (let key of sortedKeys) {
        const d = reconData[key];
        const adds = d.cb_rev + d.rec_rev;
        const deds = d.refund + d.cb + d.dispute + d.rec_dr;
        const net = d.base + adds - deds - d.fees;
        
        if (d.base > 0 || adds > 0 || deds > 0) {
          hasData = true;
          const fDate = d.date !== 'N/A' ? new Date(d.date).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}) : 'N/A';
          
          htmlTable += `
            <tr style="border-bottom:1px solid var(--border);">
              <td style="padding:10px; text-align:left; white-space:nowrap;">${fDate}</td>
              <td style="padding:10px; text-align:left; font-family:monospace; color:var(--accent); white-space:nowrap;">${d.utr}</td>
              <td style="padding:10px;">${fmtMoney(d.base)}</td>
              <td style="padding:10px; color:${d.cb_rev > 0 ? 'var(--success)' : 'inherit'};">${fmtMoney(d.cb_rev)}</td>
              <td style="padding:10px; color:${d.rec_rev > 0 ? 'var(--success)' : 'inherit'};">${fmtMoney(d.rec_rev)}</td>
              <td style="padding:10px; color:${d.refund > 0 ? 'var(--danger)' : 'inherit'};">${fmtMoney(d.refund)}</td>
              <td style="padding:10px; color:${d.cb > 0 ? 'var(--danger)' : 'inherit'};">${fmtMoney(d.cb)}</td>
              <td style="padding:10px; color:${d.dispute > 0 ? 'var(--danger)' : 'inherit'};">${fmtMoney(d.dispute)}</td>
              <td style="padding:10px; color:${d.rec_dr > 0 ? 'var(--danger)' : 'inherit'};">${fmtMoney(d.rec_dr)}</td>
              <td style="padding:10px; color:${d.fees > 0 ? 'var(--danger)' : 'inherit'};">${fmtMoney(d.fees)}</td>
              <td style="padding:10px; font-weight:700; color:var(--text-primary);">${fmtMoney(net)}</td>
            </tr>
          `;
        }
      }
      htmlTable += `</tbody></table></div>`;

      removeThinking();
      if (!hasData) addErrorMsg("No valid BW settlement data found in the file.");
      else addCustomHtmlMsg(htmlTable, `✅ **BW Reconciliation Complete!** Detailed component breakdown generated.`);
    } catch(err) {
      removeThinking();
      addErrorMsg("Failed to parse CSV: " + err.message);
    }
    input.value = ''; 
  };
  reader.readAsText(file);
}

function removeThinking() { const t=document.getElementById('thinking-msg'); if(t) t.remove(); }

function addTextOnlyMsg(text) {
  const div=document.createElement('div'); div.className='msg assistant';
  let fText=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<span style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-family:monospace;color:var(--text-primary);border:1px solid var(--border);">$1</span>').replace(/\n/g,'<br>');
  div.innerHTML=`<div class="msg-inner">
    <div class="msg-avatar" style="background:transparent; box-shadow:none;">
      <div class="ginny-avatar-wrapper" style="width:36px; height:36px;">
        <div class="ginny-avatar-glow"></div>
        <img src="ginny_logo.png" class="ginny-avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=Ginny&background=000&color=00f2fe&size=100'">
      </div>
    </div>
    <div class="msg-content">${fText}</div>
  </div>`;
  document.getElementById('chat-container').appendChild(div);
}

function addCustomHtmlMsg(htmlContent, explanation) {
  const div = document.createElement('div'); div.className = 'msg assistant';
  let fExp = explanation.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  div.innerHTML = `<div class="msg-inner">
    <div class="msg-avatar" style="background:transparent; box-shadow:none;">
      <div class="ginny-avatar-wrapper" style="width:36px; height:36px;">
        <div class="ginny-avatar-glow"></div>
        <img src="ginny_logo.png" class="ginny-avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=Ginny&background=000&color=00f2fe&size=100'">
      </div>
    </div>
    <div class="msg-content">
      <div style="margin-bottom:8px; color:var(--text-secondary);">${fExp}</div>
      ${htmlContent}
    </div>
  </div>`;
  document.getElementById('chat-container').appendChild(div);
}

function addAssistantMsg(sqlCode, explanation) {
  const div=document.createElement('div'); div.className='msg assistant';
  const safeSql=encodeURIComponent(sqlCode);
  let fExp=explanation ? escHtml(explanation).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<span style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-family:monospace;color:var(--text-primary);border:1px solid var(--border);">$1</span>') : 'Get the updated SQL query.';
  
  div.innerHTML=`<div class="msg-inner">
    <div class="msg-avatar" style="background:transparent; box-shadow:none;">
      <div class="ginny-avatar-wrapper" style="width:36px; height:36px;">
        <div class="ginny-avatar-glow"></div>
        <img src="ginny_logo.png" class="ginny-avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=Ginny&background=000&color=00f2fe&size=100'">
      </div>
    </div>
    <div class="msg-content">
      <div class="explain-block">${fExp}</div>
      <div class="sql-wrapper">
        <div class="sql-header">
          <span class="sql-lang">SQL</span>
          <div class="sql-actions" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
            <button class="btn-code toggle-sql-btn" onclick="toggleSql(this)">👁️ Show Query</button>
            <button class="btn-code primary-action" onclick="clearChat()">✨ New Session</button>
            <button class="btn-code" data-sql="${safeSql}" onclick="copyFullSQL(this)">📋 Copy</button>
            <button class="btn-code" data-sql="${safeSql}" onclick="openInSuperset(this)" style="color:#00f2fe;border-color:rgba(0,242,254,0.3);">↗ Open in Superset</button>
          </div>
        </div>
        <div class="sql-code" style="display:none;">${highlightSQL(sqlCode)}</div>
      </div>
    </div>
  </div>`;
  
  document.getElementById('chat-container').appendChild(div);
}

function toggleSql(btn) {
  const codeBlock=btn.parentElement.parentElement.nextElementSibling;
  if(codeBlock.style.display==='none'){codeBlock.style.display='block';btn.innerHTML='🙈 Hide Query';}
  else{codeBlock.style.display='none';btn.innerHTML='👁️ Show Query';}
}

function copyFullSQL(btn) {
  navigator.clipboard.writeText(decodeURIComponent(btn.getAttribute('data-sql'))).then(()=>{
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
    btn.classList.add('highlight');
    setTimeout(()=>{btn.innerHTML='📋 Copy';btn.classList.remove('highlight');},2000);
  });
}

function openInSuperset(btn) {
  navigator.clipboard.writeText(decodeURIComponent(btn.getAttribute('data-sql'))).then(()=>{
    window.open('https://ppsl-query.paytmpayments.com/sqllab/','_blank');
    showToast('SQL copied! Press Ctrl+V in Superset');
  }).catch(()=>window.open('https://ppsl-query.paytmpayments.com/sqllab/','_blank'));
}

function addErrorMsg(msg) {
  const d=document.createElement('div'); d.className='msg assistant';
  d.innerHTML=`<div class="msg-inner">
    <div class="msg-avatar" style="background:transparent; box-shadow:none;">
      <div class="ginny-avatar-wrapper" style="width:36px; height:36px;">
        <div class="ginny-avatar-glow" style="background:var(--danger);"></div>
        <img src="ginny_logo.png" class="ginny-avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=Ginny&background=000&color=ef4444&size=100'">
      </div>
    </div>
    <div class="msg-content"><div style="color:var(--danger)">${escHtml(msg)}</div></div>
  </div>`;
  document.getElementById('chat-container').appendChild(d);
}

function highlightSQL(sql) {
  const kws=['SELECT','FROM','WHERE','LEFT JOIN','RIGHT JOIN','INNER JOIN','JOIN','ON','GROUP BY','ORDER BY','HAVING','LIMIT','UNION','WITH','AS','AND','OR','NOT','IN','IS','NULL','DISTINCT','COUNT','SUM','AVG','MIN','MAX','CASE','WHEN','THEN','ELSE','END','BY','ASC','DESC','DATE_ADD','DATE_TRUNC','CURRENT_DATE','LOWER','UPPER','CAST','COALESCE','ROW_NUMBER','OVER','PARTITION','BETWEEN','LIKE','CONCAT','JSON_EXTRACT_SCALAR','DATE','INTERVAL','TIMESTAMP'];
  let out=escHtml(sql).replace(/(--[^\n]*)/g,'<span class="cmt">$1</span>');
  kws.sort((a,b)=>b.length-a.length).forEach(kw=>{out=out.replace(new RegExp(`\\b(${kw.replace(/ /g,'\\s+')})\\b`,'gi'),'<span class="kw">$1</span>');});
  return out.replace(/('(?:[^'\\]|\\.)*')/g,'<span class="str">$1</span>');
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,150)+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500); }
</script>
</body>
</html>
