<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Ginny · Enterprise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1c;
    --surface: #121a2e;
    --surface2: #1a2338;
    --border: rgba(59, 130, 246, 0.15);
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --sql-bg: #0c1324;
    --success: #22c55e;
    --danger: #ef4444;
    --shadow: 0 8px 32px -12px rgba(0, 0, 0, 0.6);
    --glass: rgba(18, 26, 46, 0.75);
  }

  body.light-mode {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: rgba(59, 130, 246, 0.2);
    --accent: #1e40af;
    --accent-hover: #1e3a8a;
    --text: #0f172a;
    --muted: #64748b;
    --sql-bg: #0f172a;
    --shadow: 0 8px 32px -12px rgba(0, 0, 0, 0.1);
    --glass: rgba(255, 255, 255, 0.85);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Premium background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Glassmorphism Base */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* LOGIN SCREEN - More Premium */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .login-wrap {
    display: flex;
    width: 860px;
    height: 520px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }
  .login-left {
    width: 340px;
    background: linear-gradient(145deg, #1e3a8a 0%, #1e40af 100%);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
    position: relative;
  }
  .login-left::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('https://picsum.photos/id/1015/600/800') center/cover;
    opacity: 0.15;
  }
  .login-brand {
    position: relative;
    z-index: 2;
  }
  .login-badge {
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 9999px;
    display: inline-block;
    margin-bottom: 20px;
    letter-spacing: 1.5px;
  }
  .login-app-name {
    font-size: 38px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1.2px;
  }
  .login-app-name span { color: #bae6fd; }

  .login-right {
    flex: 1;
    background: var(--surface);
    padding: 52px 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .login-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.6px;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    transition: all 0.3s ease;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
    outline: none;
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-hover));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 12px;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px -5px var(--accent-glow);
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
  }
  .app-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .app-title span { color: var(--accent); }

  /* TOOLBAR & PARAMS */
  .toolbar, .query-params-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .btn-tool, .btn-generate {
    border-radius: 9999px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-tool:hover, .btn-generate:hover {
    transform: translateY(-1px);
  }

  /* INPUT AREA */
  .input-row {
    background: var(--surface2);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* SQL Block */
  .sql-block {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* Toast */
  .toast {
    background: #0f172a;
    color: #fff;
    border-radius: 9999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
</style>
</head>
<body class="dark-mode">

<!-- Login Screen (Premium) -->
<div id="login-screen">
  <div class="login-wrap glass">
    <div class="login-left">
      <div class="login-brand">
        <div class="login-badge">ENTERPRISE</div>
        <div class="login-app-name">SQL<br><span>GINNY</span></div>
        <p style="margin-top:16px; opacity:0.9; font-size:15px;">Precision data intelligence for Paytm Payments</p>
      </div>
      <div style="font-size:13px; opacity:0.75;">
        Trusted by finance teams • Trino • Hive • Real-time
      </div>
    </div>
    <div class="login-right">
      <div class="login-title">Welcome back, Ratan</div>
      <p style="color:var(--muted); margin-bottom:32px;">Sign in to access your premium workspace</p>
      
      <div class="form-group" style="margin-bottom:20px;">
        <label style="font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:8px;">Username</label>
        <input class="form-input" type="text" id="login-user" placeholder="ratan.jha" value="ratan.jha">
      </div>
      <div class="form-group">
        <label style="font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:8px;">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" value="paytm@123">
        <div class="error-msg" id="login-error" style="color:#ef4444; font-size:13px; margin-top:8px; display:none;">Invalid credentials</div>
      </div>
      
      <button class="btn-login" onclick="doLogin()">Sign In Securely</button>
      <p style="text-align:center; margin-top:24px; font-size:13px; color:var(--muted);">🔒 Enterprise-grade security</p>
    </div>
  </div>
</div>

<!-- Rest of your HTML (header, app, chat, etc.) remains mostly same, but you can apply .glass class to major panels for premium look -->

  </div>
</div>

</body>
</html>
