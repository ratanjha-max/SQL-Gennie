<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Ginny · Enterprise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1c;
    --surface: #121a2e;
    --surface2: #1a2338;
    --border: rgba(59, 130, 246, 0.15);
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --accent-glow: rgba(59, 130, 246, 0.35);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --sql-bg: #0c1324;
    --success: #22c55e;
    --danger: #ef4444;
    --shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.7);
  }

  body.light-mode {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: rgba(59, 130, 246, 0.2);
    --accent: #1e40af;
    --accent-hover: #1e3a8a;
    --text: #0f172a;
    --muted: #64748b;
    --sql-bg: #0f172a;
    --shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    transition: all 0.4s ease;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 25% 15%, rgba(59,130,246,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .glass {
    background: rgba(18, 26, 46, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* ==================== LOGIN SCREEN (Fixed & Clickable) ==================== */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  .login-wrap {
    display: flex;
    width: 860px;
    height: 520px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 25px 60px -10px rgba(0, 0, 0, 0.6);
    position: relative;
    z-index: 10000;
  }

  .login-left {
    width: 340px;
    background: linear-gradient(145deg, #1e3a8a 0%, #1e40af 100%);
    padding: 48px 40px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .login-badge {
    background: rgba(255,255,255,0.25);
    color: white;
    font-weight: 700;
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 9999px;
    display: inline-block;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .login-app-name {
    font-size: 38px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1.2px;
  }
  .login-app-name span { color: #bae6fd; }

  .login-right {
    flex: 1;
    background: var(--surface);
    padding: 52px 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .login-title { font-size: 28px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 8px; }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    transition: all 0.3s ease;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-hover));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 12px;
    position: relative;
    z-index: 10;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px -5px var(--accent-glow);
  }

  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }

  /* Rest of your original styles (toolbar, chat, sql block, etc.) */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; z-index: 50; }

  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }

  .input-row {
    background: var(--surface2);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .sql-block {
    background: var(--sql-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f172a;
    color: white;
    padding: 12px 24px;
    border-radius: 9999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 99999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body class="dark-mode">

<!-- FIXED LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-wrap glass">
    <!-- Left Side -->
    <div class="login-left">
      <div>
        <div class="login-badge">ENTERPRISE</div>
        <div class="login-app-name">SQL<br><span>GINNY</span></div>
        <p style="margin-top:20px; opacity:0.9; font-size:15px;">Precision data intelligence for Paytm Payments</p>
      </div>
      <div style="font-size:13px; opacity:0.75;">Trino • Hive • Real-time Reports</div>
    </div>

    <!-- Right Side -->
    <div class="login-right">
      <div class="login-title">Welcome back, Ratan</div>
      <p style="color:var(--muted); margin-bottom:32px;">Sign in to access your premium workspace</p>

      <div style="margin-bottom:20px;">
        <label style="font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:8px;">Username</label>
        <input class="form-input" type="text" id="login-user" placeholder="ratan.jha" value="ratan.jha" autocomplete="username" onkeydown="if(event.key==='Enter') doLogin()">
      </div>

      <div style="margin-bottom:24px;">
        <label style="font-size:13px; font-weight:600; color:var(--muted); display:block; margin-bottom:8px;">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" value="paytm@123" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
        <div class="error-msg" id="login-error">❌ Invalid username or password.</div>
      </div>

      <button class="btn-login" onclick="doLogin()" id="signin-btn">Sign In Securely</button>

      <p style="text-align:center; margin-top:28px; font-size:13px; color:var(--muted);">🔒 Enterprise-grade security</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Your existing header, app, chat, script sections remain here -->
<!-- For brevity, I'm showing only the critical fixed part above. 
     Paste your full original <header>, <div id="app"> ... and <script> below this login section. -->

<script>
// Your original JavaScript (with small safety improvement)
const GROQ_API_KEY = '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';
const USERS = {
  'ratan.jha': 'paytm@123',
  'admin': 'admin@123'
};

let currentUser = '';

function doLogin() {
  const raw = document.getElementById('login-user').value.trim().toLowerCase();
  const user = raw.replace(/@paytm\.com$|@paytmpayments\.com$/, '');
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  if (USERS[user] && USERS[user] === pass) {
    currentUser = user;
    sessionStorage.setItem('sguser', user);
    errEl.style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-label').textContent = user;
    document.getElementById('user-avatar').textContent = user[0].toUpperCase();
    // Set default dates...
    const today = new Date();
    const lastYear = new Date(today); lastYear.setFullYear(today.getFullYear()-1);
    document.getElementById('date-to').value = today.toISOString().split('T')[0];
    document.getElementById('date-from').value = lastYear.toISOString().split('T')[0];
  } else {
    errEl.style.display = 'block';
    const passInput = document.getElementById('login-pass');
    passInput.classList.add('shake');
    setTimeout(() => passInput.classList.remove('shake'), 600);
  }
}

// Add this small safety
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('sguser');
  if (saved && USERS[saved]) {
    currentUser = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
  }
});
</script>

</body>
</html>
